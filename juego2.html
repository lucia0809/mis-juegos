<!DOCTYPE html>
<html>
<head>
<title>Mini juego</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #a707f1, #537fdf);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: rgba(0,0,0,0.3);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 80%;
    margin-top: 10px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

#mensaje {
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="card">
    <h1>🎮 Adivina el número</h1>
    <p>Estoy pensando en un número del 1 al 10</p>

    <input type="number" id="numero" placeholder="Escribe un número">

    <br>

    <button onclick="jugar()">Probar</button>

    <p id="mensaje"></p>
</div>

<script>
let secreto = Math.floor(Math.random() * 10) + 1;

function jugar() {
    let num = document.getElementById("numero").value;
    let mensaje = document.getElementById("mensaje");

    if (num == secreto) {
        mensaje.innerHTML = "🎉 ¡Ganaste! Era " + secreto;
        secreto = Math.floor(Math.random() * 10) + 1;
    } else {
        mensaje.innerHTML = "❌ Intenta otra vez";
    }
}
</script>

</body>
</html>
