<!DOCTYPE html>
<html>
<head>
<title>Atrapa el botón </title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #1f2840, #102a9e);
    color: white;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 15px;
}

#info {
    display: flex;
    justify-content: space-around;
    font-size: 18px;
    margin: 10px;
}

#gameArea {
    position: relative;
    width: 100%;
    height: 80vh;
    border-top: 2px solid white;
}

#btn {
    position: absolute;
    padding: 15px 20px;
    border: none;
    border-radius: 12px;
    background: #85dcf7;
    cursor: pointer;
    font-weight: bold;
    transition: 0.1s;
}

#btn:active {
    transform: scale(0.9);
}
</style>

</head>

<body>

<h1>🎮 Atrapa el botón </h1>

<div id="info">
    <div id="score">Puntos: 0</div>
    <div id="time">Tiempo: 25</div>
    <div id="level">Nivel: 1</div>
</div>

<div id="gameArea">
    <button id="btn" onclick="clickBtn()">¡Atrápame!</button>
</div>

<script>
let score = 0;
let time = 25;
let level = 1;

let btn = document.getElementById("btn");

function moverBoton() {
    let maxX = window.innerWidth - 120;
    let maxY = window.innerHeight - 200;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function clickBtn() {
    score++;
    document.getElementById("score").innerText = "Puntos: " + score;

    moverBoton();

    // subir dificultad
    if (score % 5 === 0) {
        level++;
        document.getElementById("level").innerText = "Nivel: " + level;
        time += 3; // recompensa
    }
}

function cuentaRegresiva() {
    let intervalo = setInterval(() => {
        time--;
        document.getElementById("time").innerText = "Tiempo: " + time;

        if (time <= 0) {
            clearInterval(intervalo);
            btn.disabled = true;

            alert("🏆 Juego terminado\nPuntos: " + score + "\nNivel alcanzado: " + level);
        }
    }, 1000);
}

moverBoton();
cuentaRegresiva();
</script>

</body>
</html>
